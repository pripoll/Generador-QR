<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Codigos QR Estandar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>Generador de Codigos QR</h2>
        <div class="input-group">
            <label for="qrData">Ingrese la cifra variable:</label>
            <input type="text" id="qrData" value="123456789012-34">
        </div>
        <button id="generateBtn">Generar Codigo QR</button>
        <div class="result-container" id="qrContainer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
